name: Build

on:
  push:
  pull_request:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # CI has no game install and no BANNERLORD_GAME_DIR: <GameFolder> resolves to an empty/
      # non-existent path, so Bannerlord.BuildResources' PostBuildCopyToModules target (guarded by
      # Exists($(GameFolder))) short-circuits — the build still succeeds, it just doesn't deploy
      # anywhere. See docs/research/03-module-anatomy-and-build.md.
      - name: Build
        run: dotnet build DiplomacyOverview.sln -c Release

      # No test projects exist yet (verified locally: `dotnet test` on this sln with zero test
      # projects exits 0 and runs nothing). Kept here so CI starts failing the moment a real test
      # project is added and its tests break.
      - name: Test
        run: dotnet test DiplomacyOverview.sln -c Release --no-build

      # Assemble the packed module folder by hand: on a dev machine with BANNERLORD_GAME_DIR set,
      # BuildResources performs this same copy into <game>\Modules\DiplomacyOverview (_Module\**
      # verbatim + bin\Win64_Shipping_Client\{dll,pdb}). CI has no game folder to deploy into, so we
      # reproduce that layout under a staging directory for the artifact upload instead.
      - name: Stage packed module
        shell: pwsh
        run: |
          $staging = "artifact-staging/DiplomacyOverview"
          New-Item -ItemType Directory -Force -Path "$staging/bin/Win64_Shipping_Client" | Out-Null
          Copy-Item -Path "src/DiplomacyOverview/_Module/*" -Destination $staging -Recurse -Force
          Copy-Item -Path "src/DiplomacyOverview/bin/x64/Release/net472/DiplomacyOverview.dll" -Destination "$staging/bin/Win64_Shipping_Client/" -Force
          Copy-Item -Path "src/DiplomacyOverview/bin/x64/Release/net472/DiplomacyOverview.pdb" -Destination "$staging/bin/Win64_Shipping_Client/" -Force

      - name: Upload packed module artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiplomacyOverview-module
          path: artifact-staging/DiplomacyOverview
          if-no-files-found: error

name: Release

# Cut a release by pushing a version tag, e.g.:  git tag v1.0.0 && git push origin v1.0.0
# The tag name becomes the release name and the artifact zip suffix. Keep it in sync with the
# <Version> in the csproj / SubModule.xml.
on:
  push:
    tags:
      - "v*"

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build (Release)
        run: dotnet build DiplomacyOverview.sln -c Release

      - name: Test
        run: dotnet test DiplomacyOverview.sln -c Release --no-build

      # Assemble the packed module in the install layout users expect: a DiplomacyOverview/ folder
      # they drop into <game>\Modules\. Mirrors the on-machine BuildResources deploy — _Module\**
      # verbatim plus our own DLLs (+ pdbs) under bin\Win64_Shipping_Client. Only DiplomacyOverview*
      # DLLs ship; no TaleWorlds/framework DLLs (P-03, enforced by ArchitectureInvariantTests).
      - name: Stage packed module
        shell: pwsh
        run: |
          $staging = "artifact-staging/DiplomacyOverview"
          New-Item -ItemType Directory -Force -Path "$staging/bin/Win64_Shipping_Client" | Out-Null
          Copy-Item -Path "src/DiplomacyOverview/_Module/*" -Destination $staging -Recurse -Force
          $bin = "src/DiplomacyOverview/bin/x64/Release/net472"
          Copy-Item -Path "$bin/DiplomacyOverview*.dll" -Destination "$staging/bin/Win64_Shipping_Client/" -Force
          Copy-Item -Path "$bin/DiplomacyOverview*.pdb" -Destination "$staging/bin/Win64_Shipping_Client/" -Force

      - name: Zip the module folder
        shell: pwsh
        run: Compress-Archive -Path "artifact-staging/DiplomacyOverview" -DestinationPath "DiplomacyOverview-${{ github.ref_name }}.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DiplomacyOverview-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
